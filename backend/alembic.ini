[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///./employee.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine
propagate = 0

[logger_alembic]
level = WARN
handlers = console
qualname = alembic
propagate = 0

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
